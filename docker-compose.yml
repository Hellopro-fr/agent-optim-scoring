services:
  optim-dashboard:
    build: .
    container_name: optim-dashboard
    restart: unless-stopped
    # Override du user Dockerfile pour matcher l'UID/GID de l'hote qui possede
    # les bind-mounts (dashboard/logs, results, RAG-HP-PUB, etc.).
    # Defaults : UID 1000 (user `app` du Dockerfile). Sur la VM PROD claude-agent
    # possede ses fichiers avec UID 1040 — definir APP_UID/APP_GID dans .env.
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    # Groupes supplementaires pour l'UID ci-dessus :
    # - DOCKER_GID : acces /var/run/docker.sock (obligatoire)
    # - HOST_GID_EXTRA : optionnel, groupe systeme pour acceder aux fichiers
    #   possedes par un autre user (ex: devhp=1034 sur la VM PROD)
    group_add:
      - "${DOCKER_GID:-999}"
      - "${HOST_GID_EXTRA:-999}"
    ports:
      - "5050:5050"
    environment:
      - NEXT_TOKEN_API_QUESTION=${NEXT_TOKEN_API_QUESTION}
      - TOKEN_INFO_PRODUIT=${TOKEN_INFO_PRODUIT}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PROJECT_ROOT=/app
      - RAG_HP_PUB_PATH=/rag-hp-pub
    volumes:
      # Persistance resultats et historique (bind mounts pour debug direct sur la VM)
      - ./results:/app/results
      - ./logs:/app/logs
      - ./dashboard/logs:/app/dashboard/logs
      - ./ITERATIONS.md:/app/ITERATIONS.md
      - ./BASELINE.json:/app/BASELINE.json
      # Acces au repo RAG-HP-PUB (sibling dir sur la VM)
      - ../RAG-HP-PUB:/rag-hp-pub
      # Claude CLI monte depuis l'hote (binaire + package npm + config user)
      # Les chemins sur l'hote peuvent varier — verifier avec `which claude` et `npm root -g`
      # Defaults : /usr/local/bin/claude et /usr/lib/node_modules/@anthropic-ai
      # Override via .env : CLAUDE_BIN_PATH et CLAUDE_NPM_PATH
      - ${CLAUDE_BIN_PATH:-/usr/local/bin/claude}:/usr/local/bin/claude:ro
      - ${CLAUDE_NPM_PATH:-/usr/lib/node_modules/@anthropic-ai}:/usr/lib/node_modules/@anthropic-ai:ro
      # Config Claude user (auth + settings) monte dans le home de l'utilisateur `app`
      - ${HOME}/.claude:/app/.claude
      # Docker socket pour redemarrer graph-rag-api-recherche-optim-service
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
