services:
  optim-dashboard:
    build: .
    container_name: optim-dashboard
    restart: unless-stopped
    # User non-root `app` (UID 1000). GID du group docker hote ajoute pour acceder au socket.
    # Ajuster DOCKER_GID dans .env si different (verifier via: getent group docker | cut -d: -f3)
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "5050:5050"
    environment:
      - NEXT_TOKEN_API_QUESTION=${NEXT_TOKEN_API_QUESTION}
      - TOKEN_INFO_PRODUIT=${TOKEN_INFO_PRODUIT}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PROJECT_ROOT=/app
      - RAG_HP_PUB_PATH=/rag-hp-pub
    volumes:
      # Persistance resultats et historique (bind mounts pour debug direct sur la VM)
      - ./results:/app/results
      - ./logs:/app/logs
      - ./dashboard/logs:/app/dashboard/logs
      - ./ITERATIONS.md:/app/ITERATIONS.md
      - ./BASELINE.json:/app/BASELINE.json
      # Acces au repo RAG-HP-PUB (sibling dir sur la VM)
      - ../RAG-HP-PUB:/rag-hp-pub
      # Claude CLI monte depuis l'hote (binaire + package npm + config user)
      - /usr/local/bin/claude:/usr/local/bin/claude:ro
      - /usr/lib/node_modules/@anthropic-ai:/usr/lib/node_modules/@anthropic-ai:ro
      # Config Claude user (auth + settings) monte dans le home de l'utilisateur `app`
      - ${HOME}/.claude:/app/.claude
      # Docker socket pour redemarrer graph-rag-api-recherche-optim-service
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
